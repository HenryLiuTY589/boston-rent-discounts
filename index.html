<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Boston Rent Discounts</title>
  <style>
    body{font-family:system-ui;margin:0;background:#0b0f17;color:#e8eefc}
    header{padding:20px;border-bottom:1px solid rgba(255,255,255,.1)}
    main{max-width:1100px;margin:0 auto;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
    .card{background:#0f1729;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px}
    .price{font-size:22px;font-weight:800}
    .muted{opacity:.75;font-size:12px}
    a{color:#9cc2ff;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <header>
    <h2 style="margin:0">Boston Apartment Discounts</h2>
    <div class="muted">先做 MVP：从 deals.json 读取数据并计算折后月租。</div>
  </header>
  <main>
    <div id="meta" class="muted"></div>
    <div id="grid" class="grid"></div>
  </main>

<script>
  const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);

  function concessionValue(d){
    const c=d.concession, base=d.baseRent;
    if(!c) return 0;
    if(c.type==="MONTHS_FREE") return base*Number(c.value||0);
    if(c.type==="AMOUNT_OFF") return Number(c.value||0);
    if(c.type==="MONTHLY_OFF") return Number(c.value||0)*Number(c.months||0);
    return 0;
  }
  function effectiveRent(d){
    const cv=concessionValue(d);
    return (d.baseRent*d.leaseMonths - cv)/d.leaseMonths;
  }

  function card(d){
    const eff = Math.round(effectiveRent(d));
    const save = Math.round(concessionValue(d)/d.leaseMonths);
    return `
      <div class="card">
        <div class="price">${fmt(eff)}</div>
        <div class="muted">Base ${fmt(d.baseRent)} · Save ${fmt(save)}/mo · ${d.leaseMonths} mo</div>
        <div style="margin-top:10px;font-weight:700">${d.property}</div>
        <div class="muted">${d.neighborhood || d.city || "Boston"} · ${d.beds===0?"Studio":d.beds+"B"}</div>
        <div style="margin-top:10px"><a href="${d.sourceUrl}" target="_blank" rel="noopener">Source ↗</a></div>
      </div>
    `;
  }

  async function init(){
    const res = await fetch('./deals.json', {cache:"no-store"});
    const deals = await res.json();
    deals.sort((a,b)=>effectiveRent(a)-effectiveRent(b));
    document.getElementById('meta').textContent = `${deals.length} deals`;
    document.getElementById('grid').innerHTML = deals.map(card).join("");
  }
  init().catch(()=>document.getElementById('meta').textContent="Failed to load deals.json");
</script>
</body>
</html>
